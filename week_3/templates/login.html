<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(120deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box {
    background:white;
    padding:30px;
    border-radius:10px;
    width:300px;
    box-shadow:0px 0px 20px rgba(0,0,0,0.2);
    text-align:center;
}

h2 {color:#333;}

input {
    width:90%;
    padding:10px;
    margin:10px;
    border-radius:5px;
    border:1px solid #ccc;
}

button {
    width:95%;
    padding:10px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover {background:#0056b3;}

a {text-decoration:none; color:#007bff;}
</style>
</head>



<body>

<div class="box">
<h2>Login</h2>

<form method="POST">
<input name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>
<button>Login</button>
</form>

<p>Don't have account? <a href="/register">Register</a></p>
</div>

</body>
</html>
