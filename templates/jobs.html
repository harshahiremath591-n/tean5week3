<!DOCTYPE html>
<html>
<head>
<title>Jobs</title>
<style>
body {font-family:Arial;background:#f4f6f9;}

nav {
    background:#007bff;
    padding:15px;
}
nav a {
    color:white;
    margin:10px;
    text-decoration:none;
    font-weight:bold;
}

.container {
    width:450px;
    margin:40px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0px 4px 10px rgba(0,0,0,0.2);
}

input,button {
    width:100%;
    padding:10px;
    margin:5px;
}

button {
    background:green;
    color:white;
    border:none;
}

.card {
    background:#eef;
    padding:10px;
    margin:5px;
    border-radius:5px;
}
</style>
</head>


<body>

<nav>
<a href="/dashboard">Dashboard</a>
<a href="/tasks">Tasks</a>
<a href="/jobs">Jobs</a>
<a href="/materials">Materials</a>
<a href="/electricians">Electricians</a>
</nav>

<div class="container">

<h2>💼 Jobs</h2>

<form method="POST">

<input name="title" placeholder="Job Title">
<input name="location" placeholder="Location">
<input name="deadline" placeholder="Deadline">

<select name="electrician">
{% for e in electricians %}
<option value="{{e.id}}">{{e.name}}</option>
{% endfor %}
</select>

<button>Add Job</button>
</form>

{% for j in data %}
<div class="card">
{{j.title}} <br>
📍 {{j.location}} <br>
📅 {{j.deadline}} <br>
👷 {{j.electrician.name}}

<br>
<a href="/edit/job/{{j.id}}">Edit</a>
<a href="/delete/job/{{j.id}}">Delete</a>
</div>
{% endfor %}

</body>
</html>
