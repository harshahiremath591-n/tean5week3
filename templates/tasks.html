<!DOCTYPE html>
<html>
<head>
<title>Tasks</title>
<style>
body {font-family:Arial;background:#f4f6f9;}

nav {
    background:#007bff;
    padding:15px;
}
nav a {
    color:white;
    margin:10px;
    text-decoration:none;
    font-weight:bold;
}

.container {
    width:450px;
    margin:40px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0px 4px 10px rgba(0,0,0,0.2);
}

input,button {
    width:100%;
    padding:10px;
    margin:5px;
}

button {
    background:green;
    color:white;
    border:none;
}

.card {
    background:#eef;
    padding:10px;
    margin:5px;
    border-radius:5px;
}
</style>
</head>

<body>

<nav>
<a href="/dashboard">Dashboard</a>
<a href="/tasks">Tasks</a>
<a href="/jobs">Jobs</a>
<a href="/materials">Materials</a>
<a href="/electricians">Electricians</a>
</nav>

<div class="container">

<h2>Tasks</h2>

<form method="POST">

<input name="desc" placeholder="Task">

<select name="status">
<option>Pending</option>
<option>In Progress</option>
<option>Completed</option>
</select>

<select name="job">
{% for j in jobs %}
<option value="{{j.id}}">{{j.title}}</option>
{% endfor %}
</select>

<select name="electrician">
{% for e in electricians %}
<option value="{{e.id}}">{{e.name}}</option>
{% endfor %}
</select>

<button>Add Task</button>
</form>

{% for t in data %}
<div class="card">
{{t.description}} <br>

Status: {{t.status}} <br>
Job: {{t.job.title}} <br>
Electrician: {{t.electrician.name}}

<br>
<a href="/edit/task/{{t.id}}">Edit</a>
<a href="/delete/task/{{t.id}}">Delete</a>
</div>
{% endfor %}

</body>
</html>
